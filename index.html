<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --accent-color: #27ae60;
    --bg-light: #f8f9fa;
}

body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--bg-light);
}

/* LOGO */
.logo-container {
    background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
    padding: 25px;
    text-align: center;
    color: white;
}

.logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
}

.logo-title span { color: #00ffcc; }

.logo-sub { font-size: 13px; opacity: 0.8; }

.card-product {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.product-img {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
}

.price-new {
    color: var(--accent-color);
    font-size: 1.8rem;
    font-weight: bold;
}

.price-old {
    text-decoration: line-through;
    color: gray;
}

.btn-order {
    background: linear-gradient(45deg,#27ae60,#2ecc71);
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 8px;
    font-weight: bold;
}

.form-control, .form-select {
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
    <div class="logo-title">Zenix <span>Store</span></div>
    <div class="logo-sub">by AMINE OV</div>
</div>

<div class="container mt-4">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card-product">

<img src="https://via.placeholder.com/600x600.png?text=Product" class="product-img">

<h4 class="mt-3">اسم المنتج</h4>

<p>⭐⭐⭐⭐⭐ (124 تقييم)</p>

<p class="price-new">5500 دج <span class="price-old">8900 دج</span></p>

<ul>
<li>✔ توصيل 58 ولاية</li>
<li>✔ الدفع عند الاستلام</li>
</ul>

<!-- FORM -->
<input id="name" class="form-control" placeholder="الاسم الكامل">
<input id="phone" class="form-control" placeholder="رقم الهاتف">

<select id="wilaya" class="form-select">
<option value="">جار تحميل الولايات...</option>
</select>

<textarea id="address" class="form-control" placeholder="العنوان"></textarea>

<button class="btn-order" onclick="order()">
<i class="fab fa-whatsapp"></i> تأكيد الطلب
</button>

</div>

</div>
</div>
</div>

<script>
let algeriaData = {};

// 🔥 تحميل الولايات من JSON
fetch("communes.json")
.then(res => res.json())
.then(data => {
    algeriaData = data;

    const wilayaSelect = document.getElementById("wilaya");
    wilayaSelect.innerHTML = '<option value="">اختر الولاية</option>';

    Object.keys(data).forEach(wilaya => {
        let opt = document.createElement("option");
        opt.value = wilaya;
        opt.textContent = wilaya;
        wilayaSelect.appendChild(opt);
    });
});

// 📦 إرسال الطلب
function order(){
let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let wilaya = document.getElementById("wilaya").value;
let address = document.getElementById("address").value.trim();

if(name.length < 3){
alert("الاسم غير صحيح");
return;
}

if(!/^0[5-7][0-9]{8}$/.test(phone)){
alert("رقم الهاتف غير صالح");
return;
}

if(!wilaya){
alert("اختر الولاية");
return;
}

let msg =
`🛒 طلب جديد%0A%0A` +
`المنتج: Zenix Store%0A` +
`السعر: 5500 دج%0A%0A` +
`الاسم: ${name}%0A` +
`الهاتف: ${phone}%0A` +
`الولاية: ${wilaya}%0A` +
`العنوان: ${address}`;

window.open(`https://wa.me/213663190202?text=${msg}`, "_blank");
}
</script>

</body>
</html>
