<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الاحترافي</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --main-color: #2c3e50; /* لون كلاسيكي فخم */
            --accent-color: #27ae60; /* لون الطلب والشراء */
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            color: #333;
        }

        /* الهيدر الاحترافي */
        .header {
            background: white;
            padding: 30px 15px;
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
        }

        .header h2 {
            font-weight: 700;
            color: var(--main-color);
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        /* بطاقة المنتج المطورة */
        .card-product {
            background: white;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .product-img-wrapper {
            position: relative;
            background: #eee;
        }

        .product-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }

        .badge-discount {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* السعر والتنسيق */
        .price-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .price-new {
            color: var(--accent-color);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .price-old {
            text-decoration: line-through;
            color: #95a5a6;
            font-size: 1.1rem;
        }

        /* حقول الإدخال */
        .form-control, .form-select {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.2rem rgba(39, 174, 96, 0.1);
        }

        /* زر الطلب الفاخر */
        .btn-order {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-order:hover {
            background: #219150;
            transform: translateY(-2px);
        }

        /* قسم التواصل */
        .contact-pills {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .pill {
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pill-wa { background: #25D366; color: white; }
        .pill-phone { background: #34495e; color: white; }
    </style>
</head>

<body>

<div class="header">

                        </button>
                    </div>
                </div>
            </div>

            <div class="contact-pills">
                <a href="https://wa.me/213663190202" class="pill pill-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                <a href="tel:0663190202" class="pill pill-phone"><i class="fas fa-phone"></i> اتصل بنا</a>
            </div>

        </div>
    </div>
</div>

<script>
    function order(){
        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;
        let wilaya = document.getElementById("wilaya").value;
        let address = document.getElementById("address").value;

        if(!name || !phone || !wilaya){
            alert("يرجى ملء الحقول الأساسية (الاسم، الهاتف، الولاية)");
            return;
        }

        let msg = `*طلب جديد من المتجر* 🛒%0A%0A` +
                  `*المنتج:* اسم المنتج الاحترافي%0A` +
                  `*السعر:* 5500 دج%0A%0A` +
                  `*الاسم:* ${name}%0A` +
                  `*الهاتف:* ${phone}%0A` +
                  `*الولاية:* ${wilaya}%0A` +
                  `*العنوان:* ${address}`;

        window.open(`https://wa.me/213663190202?text=${msg}`, "_blank");
    }
</script>

</html>
