<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
font-family: Arial;
background:#f5f6fa;
}

.header{
background:#008751;
color:white;
text-align:center;
padding:20px;
border-radius:0 0 20px 20px;
}

.card{
border:none;
border-radius:20px;
}

.product-img{
width:100%;
max-height:350px;
object-fit:cover;
border-radius:15px;
}

.price{
color:red;
font-size:22px;
font-weight:bold;
}

.old-price{
text-decoration:line-through;
color:gray;
}

.btn-buy{
background:#008751;
color:white;
padding:12px;
border-radius:30px;
border:none;
width:100%;
font-weight:bold;
transition:0.3s;
}

.btn-buy:hover{
transform:scale(1.03);
opacity:0.9;
}

.box{
background:#fff;
padding:15px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.total{
background:#e9f7ef;
padding:10px;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h2>🛒 متجري الإلكتروني</h2>
<p>توصيل لكل الولايات + الدفع عند الاستلام</p>
</div>

<div class="container my-4">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card p-3 box">

<img src="https://via.placeholder.com/500x400.png?text=Product" class="product-img">

<h4 class="mt-2">منتج احترافي</h4>

<div class="old-price">9000 دج</div>
<div class="price">5500 دج</div>

<p>✔️ جودة عالية<br>✔️ ضمان<br>✔️ توصيل 58 ولاية</p>

<input id="name" class="form-control mb-2" placeholder="الاسم الكامل">
<input id="phone" class="form-control mb-2" placeholder="رقم الهاتف">

<select id="wilaya" class="form-select mb-2" onchange="calcPrice()">
<option value="">اختر الولاية</option>
<option data-price="300">الجزائر</option>
<option data-price="300">وهران</option>
<option data-price="400">قسنطينة</option>
<option data-price="400">سطيف</option>
<option data-price="400">باتنة</option>
<option data-price="400">تلمسان</option>
<option data-price="400">عنابة</option>
<option data-price="500">ورقلة</option>
<option data-price="600">تمنراست</option>
</select>

<select id="shipping" class="form-select mb-2">
<option value="">اختر شركة التوصيل</option>
<option>Yalidine</option>
<option>ZR Express</option>
<option>توصيل خاص</option>
<option>أخرى</option>
</select>

<textarea id="address" class="form-control mb-2" placeholder="العنوان الكامل"></textarea>

<div class="total mb-2">
🚚 التوصيل: <span id="delivery">0</span> دج<br>
💵 المجموع: <span id="total">5500</span> دج
</div>

<button class="btn-buy" onclick="order()">اطلب الآن عبر واتساب</button>

</div>

</div>

</div>

</div>

<script>

let basePrice = 5500;

function calcPrice(){
let w=document.getElementById("wilaya");
let price=w.options[w.selectedIndex].getAttribute("data-price")||0;

document.getElementById("delivery").innerText=price;
document.getElementById("total").innerText=basePrice+parseInt(price);
}

function order(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let wilaya=document.getElementById("wilaya").value;
let shipping=document.getElementById("shipping").value;
let address=document.getElementById("address").value;

let delivery=document.getElementById("delivery").innerText;
let total=document.getElementById("total").innerText;

if(!name || !phone || !wilaya){
alert("اكمل المعلومات!");
return;
}

let msg=`🛒 طلب جديد

📦 المنتج: منتج احترافي
💰 السعر: 5500 دج
🚚 التوصيل: ${delivery} دج
💵 المجموع: ${total} دج

👤 الاسم: ${name}
📞 الهاتف: ${phone}
📍 الولاية: ${wilaya}
🚚 الشركة: ${shipping}
🏠 العنوان: ${address}`;

let url="https://wa.me/213663190202?text="+encodeURIComponent(msg);

window.open(url,"_blank");

}

</script>

</body>
</html>
