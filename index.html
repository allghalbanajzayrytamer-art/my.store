  <!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Store - PRO</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>
:root{
    --accent:#27ae60;
    --dark:#0f172a;
    --bg:#f6f7fb;
}
body{
    font-family:Cairo,sans-serif;
    background:var(--bg);
    color:#222;
}

header{
    background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    text-align:center;
    padding:20px;
}
.logo{
    font-family:Orbitron;
    font-size:28px;
}
.logo span{color:#00ffcc}

.card-box{
    background:#fff;
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    margin-top:20px;
}

.product-img{
    width:100%;
    max-height:350px;
    object-fit:contain;
    border-radius:10px;
}

.price{
    background:#eafaf1;
    padding:12px;
    border-right:5px solid var(--accent);
    border-radius:10px;
}
.price-new{font-size:2rem;color:var(--accent);font-weight:bold}
.price-old{text-decoration:line-through;color:#888;margin-right:10px}

.form-control,.form-select{
    border-radius:10px;
    padding:12px;
}

.btn-order{
    background:linear-gradient(45deg,#27ae60,#2ecc71);
    border:none;
    color:#fff;
    width:100%;
    padding:15px;
    font-size:1.2rem;
    border-radius:12px;
    transition:.3s;
}
.btn-order:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(39,174,96,.3);
}

.total{
    background:#1e293b;
    color:#fff;
    padding:12px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}
</style></head>
<body><header>
    <div class="logo">Zenix <span>Store</span></div>
    <small>PRO Version by AMINE OV</small>
</header><div class="container">
<div class="row justify-content-center">
<div class="col-md-6"><div class="card-box"><img src="pro.jpg" class="product-img" onerror="this.src='https://via.placeholder.com/500x500?text=Product'"><h4 class="mt-3">اسم المنتج الاحترافي</h4>
<p>⭐⭐⭐⭐⭐ (124 تقييم)</p><div class="price mb-3">
<span class="price-new" id="basePrice">5500</span> دج
<span class="price-old">8900 دج</span>
</div><div class="mb-2"><i class="fa fa-truck text-success"></i> توصيل 58 ولاية</div>
<div class="mb-3"><i class="fa fa-check text-success"></i> الدفع عند الاستلام</div><label>الاسم الكامل</label> <input class="form-control" id="name">

<label>الهاتف</label> <input class="form-control" id="phone">

<label>الولاية</label> <select class="form-select" id="wilaya" onchange="loadCities()"></select>

<label>البلدية</label> <select class="form-select" id="commune"></select>

<label>الكمية</label> <input type="number" class="form-control" id="qty" value="1" min="1" onchange="updateTotal()">

<div class="total mt-3">
<span>المجموع</span>
<span id="total">5500 دج</span>
</div><button class="btn-order mt-3" onclick="submitOrder()">
<i class="fab fa-whatsapp"></i> تأكيد عبر واتساب
</button></div>
</div>
</div>
</div><script src="communes.js"></script><script>
const PRICE = 5500;

window.onload = function(){
    let w = document.getElementById("wilaya");
    for(let i in algeriaData){
        let o=document.createElement("option");
        o.value=i;
        o.textContent=i;
        w.appendChild(o);
    }
    updateTotal();
};

function loadCities(){
    let w = document.getElementById("wilaya").value;
    let c = document.getElementById("commune");
    c.innerHTML="<option>اختر البلدية</option>";

    if(algeriaData[w]){
        algeriaData[w].forEach(x=>{
            let o=document.createElement("option");
            o.value=x;
            o.textContent=x;
            c.appendChild(o);
        });
    }
}

function updateTotal(){
    let q = document.getElementById("qty").value;
    document.getElementById("total").textContent = (q*PRICE)+" دج";
}

function submitOrder(){
    let name=document.getElementById("name").value.trim();
    let phone=document.getElementById("phone").value.trim();
    let wilaya=document.getElementById("wilaya").value;
    let commune=document.getElementById("commune").value;
    let qty=document.getElementById("qty").value;
    let total=qty*PRICE;

    if(name.length<3 || !/^0[5-7][0-9]{8}$/.test(phone) || !wilaya || !commune){
        alert("اكمل المعلومات بشكل صحيح");
        return;
    }

    let msg = `طلب جديد:\n`+
    `الاسم: ${name}\n`+
    `الهاتف: ${phone}\n`+
    `الولاية: ${wilaya}\n`+
    `البلدية: ${commune}\n`+
    `الكمية: ${qty}\n`+
    `المجموع: ${total} دج`;

    let url = "https://wa.me/213663190202?text="+encodeURIComponent(msg);
    window.open(url,"_blank");
}
</script></body>
  </html>
