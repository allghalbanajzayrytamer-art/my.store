<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --accent-color: #27ae60;
    --bg-light: #f8f9fa;
}

body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--bg-light);
}

/* LOGO */
.logo-container {
    background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
    padding: 25px;
    text-align: center;
    color: white;
}

.logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
}

.logo-title span {
    color: #00ffcc;
}

.logo-sub {
    font-size: 13px;
    opacity: 0.8;
}

.logo-badge {
    margin-top: 10px;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    background: #00ffcc;
    color: #000;
    font-weight: bold;
    font-size: 12px;
}

/* Counter */
.counter {
    color: red;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}

/* Card */
.card-product {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    animation: fadeIn 0.6s ease;
    transition: 0.3s;
}

.card-product:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

.product-img {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
}

.price-new {
    color: var(--accent-color);
    font-size: 1.8rem;
    font-weight: bold;
}

.price-old {
    text-decoration: line-through;
    color: gray;
}

.btn-order {
    background: linear-gradient(45deg,#27ae60,#2ecc71);
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 8px;
    font-weight: bold;
}

.form-control, .form-select {
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 8px;
}
</style>
</head>

<body>

<script>
function order(){
let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let wilaya = document.getElementById("wilaya").value;
let address = document.getElementById("address").value.trim();

if(name.length < 3){
alert("الاسم غير صحيح");
return;
}

if(!/^0[5-7][0-9]{8}$/.test(phone)){
alert("رقم الهاتف غير صالح");
return;
}

if(!wilaya){
alert("اختر الولاية");
return;
}

let msg = `طلب جديد 🛒%0A%0A` +
`المنتج: اسم المنتج%0A` +
`السعر: 5500 دج%0A%0A` +
`الاسم: ${name}%0A` +
`الهاتف: ${phone}%0A` +
`الولاية: ${wilaya}%0A` +
`العنوان: ${address}`;

window.open(`https://wa.me/213663190202?text=${msg}`, "_blank");
}
</script>
