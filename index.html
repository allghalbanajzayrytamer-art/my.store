<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenix Store - PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{ --accent:#27ae60; --dark:#0f172a; --bg:#f6f7fb; }
        body{ font-family:Cairo,sans-serif; background:var(--bg); color:#222; text-align: right; }
        header{ background:linear-gradient(45deg,#0f2027,#203a43,#2c5364); color:#fff; text-align:center; padding:20px; }
        .logo{ font-family:Orbitron; font-size:28px; }
        .logo span{color:#00ffcc}
        .card-box{ background:#fff; border-radius:18px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,.08); margin: 20px auto; max-width: 500px; }
        .product-img{ width:100%; max-height:300px; object-fit:contain; border-radius:10px; }
        .price{ background:#eafaf1; padding:12px; border-right:5px solid var(--accent); border-radius:10px; margin: 15px 0; }
        .price-new{font-size:1.8rem; color:var(--accent); font-weight:bold}
        .price-old{text-decoration:line-through; color:#888; margin-right:10px}
        .form-label { font-weight: bold; margin-top: 10px; display: block; }
        .form-control, .form-select { border-radius: 8px; padding: 12px; border: 1px solid #ddd; margin-bottom: 5px; }
        .btn-order{ background:linear-gradient(45deg,#27ae60,#2ecc71); border:none; color:#fff; width:100%; padding:15px; font-size:1.2rem; border-radius:12px; transition:.3s; cursor: pointer; font-weight: bold; }
        .btn-order:hover{ transform:translateY(-2px); box-shadow:0 10px 20px rgba(39,174,96,.3); }
        .total{ background:#1e293b; color:#fff; padding:12px; border-radius:10px; display:flex; justify-content:space-between; margin-top: 15px; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">Zenix <span>Store</span></div>
    <small>PRO Version by AMINE OV</small>
</header>

<div class="container">
    <div class="card-box">
        <img src="pro.jpg" class="product-img" onerror="this.src='https://via.placeholder.com/400?text=Product+Image'">
        <h4 class="mt-3">اسم المنتج الاحترافي</h4>
        <div class="price">
            <span class="price-new">5500</span> دج
            <span class="price-old">8900 دج</span>
        </div>
        
        <div class="mb-3">
            <div><i class="fa fa-truck text-success"></i> توصيل سريع لـ 58 ولاية</div>
            <div><i class="fa fa-check text-success"></i> الدفع عند الاستلام (COD)</div>
        </div>

        <label class="form-label">الاسم الكامل</label>
        <input type="text" class="form-control" id="name" placeholder="مثال: محمد الأمين">

        <label class="form-label">رقم الهاتف</label>
        <input type="tel" class="form-control" id="phone" placeholder="0661000000">

        <label class="form-label">الولاية</label>
        <select class="form-select" id="wilaya" onchange="loadCities()">
            <option value="">-- اختر الولاية --</option>
        </select>

        <label class="form-label">البلدية</label>
        <select class="form-select" id="commune">
            <option value="">-- اختر البلدية --</option>
        </select>

        <label class="form-label">الكمية</label>
        <input type="number" class="form-control" id="qty" value="1" min="1" onchange="updateTotal()">

        <div class="total">
            <span>المجموع الإجمالي:</span>
            <span id="totalText" style="font-weight:bold; font-size: 1.2rem;">5500 دج</span>
        </div>

        <button class="btn-order mt-4" onclick="submitOrder()">
            <i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب
        </button>
    </div>
</div>

<script src="communes.js"></script>

<script>
const BASE_PRICE = 5500;

function initWilayas() {
    const wSelect = document.getElementById("wilaya");
    
    if (typeof algeriaData !== 'undefined') {
        // ترتيب الولايات حسب الرقم (01, 02, 03...)
        const sortedWilayas = Object.keys(algeriaData).sort((a, b) => {
            return parseInt(a) - parseInt(b);
        });

        wSelect.innerHTML = '<option value="">-- اختر الولاية --</option>';
        sortedWilayas.forEach(wilaya => {
            let opt = new Option(wilaya, wilaya);
            wSelect.add(opt);
        });
        console.log("✅ تم تحميل 58 ولاية بنجاح");
    } else {
        console.log("⏳ جاري تحميل بيانات الولايات...");
        setTimeout(initWilayas, 500);
    }
}

// تشغيل الدالة فور تحميل الصفحة
window.addEventListener('load', initWilayas);

function loadCities() {
    const wVal = document.getElementById("wilaya").value;
    const cSelect = document.getElementById("commune");
    cSelect.innerHTML = '<option value="">-- اختر البلدية --</option>';
    
    if (wVal && algeriaData[wVal]) {
        // ترتيب البلديات أبجدياً
        const sortedCities = [...algeriaData[wVal]].sort();
        sortedCities.forEach(city => {
            cSelect.add(new Option(city, city));
        });
    }
}

function updateTotal() {
    let q = document.getElementById("qty").value;
    if(q < 1) q = 1;
    document.getElementById("totalText").innerText = (q * BASE_PRICE) + " دج";
}

function submitOrder() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const wilaya = document.getElementById("wilaya").value;
    const commune = document.getElementById("commune").value;
    const qty = document.getElementById("qty").value;

    if (!name || name.length < 3) { alert("يرجى إدخال الاسم الكامل"); return; }
    if (!/^0[5-7][0-9]{8}$/.test(phone)) { alert("رقم الهاتف غير صحيح"); return; }
    if (!wilaya || !commune) { alert("يرجى اختيار الولاية والبلدية"); return; }

    const message = `*طلب جديد (Zenix Store)*\n` +
                    `--------------------------\n` +
                    `👤 *الاسم:* ${name}\n` +
                    `📞 *الهاتف:* ${phone}\n` +
                    `📍 *الولاية:* ${wilaya}\n` +
                    `🏘️ *البلدية:* ${commune}\n` +
                    `📦 *الكمية:* ${qty}\n` +
                    `💰 *الإجمالي:* ${qty * BASE_PRICE} دج\n` +
                    `--------------------------`;

    const whatsappUrl = `https://wa.me/213663190202?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, "_blank");
}

</script>
</body>
</html>
